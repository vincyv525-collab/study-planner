
<!DOCTYPE html>
<html>
<head>
    <title>Focus Timer</title>

    <style>
        body{
            margin:0;
            padding:0;
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:#0f172a;
            font-family:'Segoe UI', sans-serif;
            color:#e5e7eb;
        }

        .pomodoro-container{
            text-align:center;
            background:#020617;
            padding:40px;
            border-radius:10px;
            border:1px solid #1e293b;
            width:320px;
        }

        h1{
            color:#f1f5f9;
            margin-bottom:25px;
            font-weight:500;
        }

        .timer-circle{
            width:220px;
            height:220px;
            margin:auto;
            border-radius:50%;
            border:4px solid #1e293b;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        #timer{
            font-size:48px;
            font-weight:600;
            color:#60a5fa;
        }

        .buttons{
            margin-top:30px;
        }

        button{
            border:none;
            padding:10px 18px;
            margin:8px;
            border-radius:6px;
            cursor:pointer;
            background:#1d4ed8;
            color:white;
            font-size:14px;
            transition:0.2s;
        }

        button:hover{
            background:#2563eb;
        }

        .quote{
            margin-top:20px;
            color:#94a3b8;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="pomodoro-container">

    <h1>Focus Timer</h1>

    <div class="timer-circle">
        <div id="timer">25:00</div>
    </div>

    <div class="buttons">
        <button onclick="startFocus()">Focus</button>
        <button onclick="startBreak()">Break</button>
        <button onclick="pauseTimer()">Pause</button>
    </div>

    <p class="quote">
        Stay consistent. Small progress adds up.
    </p>

</div>

<script>

let timer;
let timeLeft = 1500;

function updateDisplay(){
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("timer").innerHTML =
        minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
}

function startTimer(seconds){
    clearInterval(timer);
    timeLeft = seconds;
    updateDisplay();

    timer = setInterval(function(){
        if(timeLeft > 0){
            timeLeft--;
            updateDisplay();
        } else {
            clearInterval(timer);
            alert("Session Complete!");
        }
    }, 1000);
}

function startFocus(){
    startTimer(1500); // 25 min
}

function startBreak(){
    startTimer(300); // 5 min
}

function pauseTimer(){
    clearInterval(timer);
}

updateDisplay();

</script>

</body>

</html>
