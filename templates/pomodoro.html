<!DOCTYPE html>
<html>
<head>
    <title>Focus Timer</title>

    <style>

        body{
            margin:0;
            padding:0;
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background: linear-gradient(135deg, #f8f9fb, #eef1f5);
            font-family:'Segoe UI', sans-serif;
            color:#333;
        }

        /* 🌸 CONTAINER */
        .pomodoro-container{
            text-align:center;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            padding:40px;
            border-radius:20px;
            width:340px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            animation: fadeIn 0.6s ease;
        }

        /* 🌸 TITLE */
        h1{
            color:#222;
            margin-bottom:25px;
            font-weight:600;
        }

        /* 🌸 TIMER CIRCLE */
        .timer-circle{
            width:220px;
            height:220px;
            margin:auto;
            border-radius:50%;

            display:flex;
            justify-content:center;
            align-items:center;

            background: radial-gradient(circle, #ffffff, #f5f5f5);

            box-shadow: inset 0 0 15px rgba(0,0,0,0.05),
                        0 10px 25px rgba(0,0,0,0.08);

            transition: 0.3s;
        }

        /* 🌸 TIME TEXT */
        #timer{
            font-size:48px;
            font-weight:700;
            color:#333;
        }

        /* 🌸 BUTTONS */
        .buttons{
            margin-top:30px;
        }

        button{
            border:none;
            padding:10px 18px;
            margin:8px;
            border-radius:12px;
            cursor:pointer;

            background:#e8aeb7;
            color:white;
            font-size:14px;

            transition:0.25s;
        }

        button:hover{
            background:#d98c98;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        button:active{
            transform: scale(0.95);
        }

        /* 🌸 QUOTE */
        .quote{
            margin-top:20px;
            color:#777;
            font-size:14px;
            font-style: italic;
        }

        /* 🌸 ANIMATION */
        @keyframes fadeIn{
            from{
                opacity:0;
                transform: translateY(20px);
            }
            to{
                opacity:1;
                transform: translateY(0);
            }
        }

    </style>
</head>

<body>

<div class="pomodoro-container">

    <h1>Focus Timer</h1>

    <div class="timer-circle">
        <div id="timer">25:00</div>
    </div>

    <div class="buttons">
        <button onclick="startFocus()">Focus</button>
        <button onclick="startBreak()">Break</button>
        <button onclick="pauseTimer()">Pause</button>
    </div>

    <p class="quote">
        Stay consistent. Small progress adds up.
    </p>

</div>

<script>

let timer;
let timeLeft = 1500;

function updateDisplay(){
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("timer").innerHTML =
        minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
}

function startTimer(seconds){
    clearInterval(timer);
    timeLeft = seconds;
    updateDisplay();

    timer = setInterval(function(){
        if(timeLeft > 0){
            timeLeft--;
            updateDisplay();
        } else {
            clearInterval(timer);
            alert("Session Complete!");
        }
    }, 1000);
}

function startFocus(){
    startTimer(1500);
}

function startBreak(){
    startTimer(300);
}

function pauseTimer(){
    clearInterval(timer);
}

updateDisplay();

</script>

</body>
</html>
