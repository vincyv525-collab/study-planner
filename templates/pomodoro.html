
<!DOCTYPE html>
<html>
<head>
    <title>Focus Timer</title>

   <style>

body{
    margin:0;
    padding:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background: linear-gradient(135deg, #fff1f5, #ffe4ec);
    font-family:'Segoe UI', sans-serif;
    color:#333;
}

/* 🌸 CONTAINER */
.pomodoro-container{
    text-align:center;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:20px;
    width:340px;

    box-shadow: 0 10px 40px rgba(255, 143, 171, 0.25);
    animation: fadeIn 0.6s ease;
}

/* 🌸 TITLE */
h1{
    color:#ff6f91;
    margin-bottom:25px;
    font-weight:600;
    letter-spacing:0.5px;
}

/* 🌸 TIMER CIRCLE */
.timer-circle{
    width:220px;
    height:220px;
    margin:auto;
    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background: radial-gradient(circle, #fff, #ffe4ec);
    box-shadow: inset 0 0 20px rgba(255, 143, 171, 0.3),
                0 10px 30px rgba(255, 143, 171, 0.2);

    transition: 0.3s;
}

/* 🌸 TIME TEXT */
#timer{
    font-size:48px;
    font-weight:700;
    color:#ff4d6d;
}

/* 🌸 BUTTONS */
.buttons{
    margin-top:30px;
}

button{
    border:none;
    padding:10px 18px;
    margin:8px;
    border-radius:12px;
    cursor:pointer;

    background:#ff8fab;
    color:white;
    font-size:14px;

    transition:0.25s;
}

/* hover */
button:hover{
    background:#ff6f91;
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 5px 15px rgba(255, 143, 171, 0.4);
}

/* 🌸 QUOTE */
.quote{
    margin-top:20px;
    color:#777;
    font-size:14px;
    font-style: italic;
}

/* 🌸 ANIMATION */
@keyframes fadeIn{
    from{
        opacity:0;
        transform: translateY(20px);
    }
    to{
        opacity:1;
        transform: translateY(0);
    }
}

/* 🌸 BUTTON ACTIVE EFFECT */
button:active{
    transform: scale(0.95);
}

</style>
</head>

<body>

<div class="pomodoro-container">

    <h1>Focus Timer</h1>

    <div class="timer-circle">
        <div id="timer">25:00</div>
    </div>

    <div class="buttons">
        <button onclick="startFocus()">Focus</button>
        <button onclick="startBreak()">Break</button>
        <button onclick="pauseTimer()">Pause</button>
    </div>

    <p class="quote">
        Stay consistent. Small progress adds up.
    </p>

</div>

<script>

let timer;
let timeLeft = 1500;

function updateDisplay(){
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("timer").innerHTML =
        minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
}

function startTimer(seconds){
    clearInterval(timer);
    timeLeft = seconds;
    updateDisplay();

    timer = setInterval(function(){
        if(timeLeft > 0){
            timeLeft--;
            updateDisplay();
        } else {
            clearInterval(timer);
            alert("Session Complete!");
        }
    }, 1000);
}

function startFocus(){
    startTimer(1500); // 25 min
}

function startBreak(){
    startTimer(300); // 5 min
}

function pauseTimer(){
    clearInterval(timer);
}

updateDisplay();

</script>

</body>

</html>
