<!DOCTYPE html>
<html>
<head>
    <title>Focus Timer</title>

    <style>

        body{
            margin:0;
            padding:0;
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background: linear-gradient(135deg, #f8f9fb, #eef1f5);
            font-family:'Segoe UI', sans-serif;
            color:#333;
        }

        /* 🌸 CONTAINER */
        .pomodoro-container{
            text-align:center;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            padding:40px;
            border-radius:20px;
            width:340px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            animation: fadeIn 0.6s ease;
        }

        h1{
            color:#222;
            margin-bottom:25px;
            font-weight:600;
        }

        /* 🌸 TIMER CIRCLE */
        .timer-circle{
            position: relative;
            width:220px;
            height:220px;
            margin:auto;
        }

        svg{
            transform: rotate(-90deg);
        }

        .progress-bg{
            fill:none;
            stroke:#eee;
            stroke-width:8;
        }

        .progress{
            fill:none;
            stroke:#e8aeb7;
            stroke-width:8;
            stroke-linecap:round;

            stroke-dasharray:628;
            stroke-dashoffset:628;

            transition: stroke-dashoffset 1s linear;
        }

        #timer{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%);
            font-size:48px;
            font-weight:700;
            color:#333;
        }

        /* 🌸 BUTTONS */
        .buttons{
            margin-top:30px;
        }

        button{
            border:none;
            padding:10px 18px;
            margin:8px;
            border-radius:12px;
            cursor:pointer;

            background:#e8aeb7;
            color:white;
            font-size:14px;

            transition:0.25s;
        }

        button:hover{
            background:#d98c98;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        button:active{
            transform: scale(0.95);
        }

        /* 🌸 QUOTE */
        .quote{
            margin-top:20px;
            color:#777;
            font-size:14px;
            font-style: italic;
        }

        /* 🌸 FADE ANIMATION */
        @keyframes fadeIn{
            from{
                opacity:0;
                transform: translateY(20px);
            }
            to{
                opacity:1;
                transform: translateY(0);
            }
        }

    </style>
</head>

<body>

<div class="pomodoro-container">

    <h1>Focus Timer</h1>

    <div class="timer-circle">

        <svg width="220" height="220">
            <circle class="progress-bg" cx="110" cy="110" r="100"></circle>
            <circle class="progress" cx="110" cy="110" r="100"></circle>
        </svg>

        <div id="timer">25:00</div>

    </div>

    <div class="buttons">
        <button onclick="startFocus()">Focus</button>
        <button onclick="startBreak()">Break</button>
        <button onclick="pauseTimer()">Pause</button>
    </div>

    <p class="quote">
        Stay consistent. Small progress adds up.
    </p>

</div>

<script>

let timer;
let timeLeft = 1500;
let totalTime = 1500;

const circle = document.querySelector(".progress");
const circumference = 2 * Math.PI * 100;

circle.style.strokeDasharray = circumference;

function updateDisplay(){
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("timer").innerHTML =
        minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

    let progress = timeLeft / totalTime;
    let offset = circumference * (1 - progress);

    circle.style.strokeDashoffset = offset;
}

function startTimer(seconds){
    clearInterval(timer);
    timeLeft = seconds;
    totalTime = seconds;

    updateDisplay();

    timer = setInterval(function(){
        if(timeLeft > 0){
            timeLeft--;
            updateDisplay();
        } else {
            clearInterval(timer);
            showDone();
        }
    }, 1000);
}

function startFocus(){
    startTimer(1500);
}

function startBreak(){
    startTimer(300);
}

function pauseTimer(){
    clearInterval(timer);
}

/* 🌸 CUTE FINISH MESSAGE (NO UGLY ALERT) */
function showDone(){
    const box = document.createElement("div");

    box.innerHTML = "✨ Session Complete ✨";
    box.style.position = "fixed";
    box.style.top = "20px";
    box.style.left = "50%";
    box.style.transform = "translateX(-50%)";
    box.style.background = "#fff";
    box.style.padding = "12px 20px";
    box.style.borderRadius = "12px";
    box.style.boxShadow = "0 5px 20px rgba(0,0,0,0.1)";
    box.style.fontSize = "14px";

    document.body.appendChild(box);

    setTimeout(() => box.remove(), 3000);
}

updateDisplay();

</script>

</body>
</html>
