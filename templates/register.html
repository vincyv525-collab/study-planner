
{% extends 'base.html' %}

{% block content %}

<div class="card">

<h1>Create Account</h1>

<form method="POST">

<input type="text"
name="username"
placeholder="Enter Username"
required>

<input type="email"
name="email"
placeholder="Enter Email"
required>

<input type="password"
name="password"
placeholder="Enter Password"
required>


<button type="submit">
Create Account
</button>

</form>

<a href="/login" class="login-link">
Already have an account? Sign in
</a>

</div>

{% endblock %}
