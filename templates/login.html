{% extends 'base.html' %}

{% block content %}

<div class="card login-card">

    <h1>Welcome Back </h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <a href="/register" class="auth-link">
        Create Account
    </a>
  

</div>

{% endblock %}
